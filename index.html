<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feliz Cumpleaños Sofia</title>
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/GiftBox-32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="64x64"
      href="./images/GiftBox-64.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="128x128"
      href="./images/GiftBox-128.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="256x256"
      href="./images/GiftBox-256.png"
    />
    <link rel="stylesheet" href="main.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Dancing+Script&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div id="drag-container">
      <div id="spin-container">
        <img src="./images/sofia1.jpg" alt="" />
        <img src="./images/sofia8.jpg" alt="" />
        <img src="./images/sofia2.jpg" alt="" />
        <img src="./images/sofia3.jpg" alt="" />
        <img src="./images/sofia4.jpg" alt="" />
        <img src="./images/sofia5.jpg" alt="" />
        <img src="./images/sofia6.jpg" alt="" />
        <img src="./images/sofia7.jpg" alt="" />
        <img src="./images/sofia9.jpg" alt="" />
        <img src="./images/sofia10.jpg" alt="" />
        <p>Feliz<span> Cumpleaños</span> Sofia</p>
        <button class="button" onclick="confetti()"></button>
      </div>
      <div id="ground"></div>
    </div>

    <div id="music-container"></div>

    <audio id="myAudio" autoplay playsinline loop muted>
      <source src="music/sofia.mp3" type="audio/mpeg" />
    </audio>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1/dist/confetti.browser.min.js"></script>
    <script src="main.js"></script>
  </body>
  <button id="startBtn" class="btn">
    <div class="text-1">Hola Sofia</div>

    <div class="text-2">
      (Mueve con tu dedito la pantalla y las imágenes)
    </div>
  </button>

  <script>
    function lanzarConfetti() {
      confetti({
        particleCount: 150,
        spread: 90,
        origin: { y: 0.6 },
      });
    }

    function confettiAuto() {
      let veces = 0;

      let intervalo = setInterval(() => {
        lanzarConfetti();
        veces++;

        if (veces === 4) {
          clearInterval(intervalo);
        }
      }, 2000);
    }

    window.addEventListener("load", () => {
      setTimeout(confettiAuto, 1500);
    });

    const spinContainer = document.getElementById("spin-container");

    spinContainer.addEventListener("click", () => {
      lanzarConfetti();
      confettiAuto();
    });
  </script>
  <script>
    const startBtn = document.getElementById("startBtn");
    const audio = document.getElementById("myAudio");

    startBtn.addEventListener("click", () => {
      audio.muted = false;
      audio.play().catch((err) => console.log(err));

      startBtn.style.opacity = "0";
      startBtn.style.pointerEvents = "none";

      setTimeout(init, 0);
      playSpin(true);
    });
  </script>
</html>
